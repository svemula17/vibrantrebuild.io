name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # lets you trigger a deploy manually from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── 1. Build ─────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          # If your repo is  github.com/YOU/vibrant-inc-rebuild  the site lives at
          # https://YOU.github.io/vibrant-inc-rebuild  → basePath must be /vibrant-inc-rebuild
          #
          # If your repo is  github.com/YOU/YOU.github.io  the site lives at
          # https://YOU.github.io  → leave basePath empty by removing the line below.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      # GitHub Pages strips folders that start with _ (like _next) unless we add this file
      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  # ── 2. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
